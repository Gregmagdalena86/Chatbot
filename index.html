<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mein KI-Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="header">
      <div>
        <p class="eyebrow">Demo-Chatbot</p>
        <h1>Mein KI-Chatbot</h1>
        <p class="subtitle">Frage stellen, Antwort bekommen. Der API-Key bleibt sicher im Backend.</p>
      </div>
      <button id="clearBtn" class="secondary">Chat löschen</button>
    </section>

    <section id="chat" class="chat" aria-live="polite"></section>

    <form id="chatForm" class="composer">
      <textarea id="messageInput" rows="2" placeholder="Schreibe deine Frage..." required></textarea>
      <button id="sendBtn" type="submit">Senden</button>
    </form>

    <p class="hint">Hinweis: KI-Antworten können Fehler enthalten. Wichtige Angaben immer prüfen.</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
